<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#09090b;color:#f1f5f9;font-family:system-ui,-apple-system,sans-serif;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#18181b}::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:3px}
#app{display:flex;height:100vh;overflow:hidden}
#sb{width:212px;background:#111115;border-right:1px solid #1f1f23;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
#ct{flex:1;overflow-y:auto}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;align-items:center;justify-content:center;padding:16px}
.mb{background:#18181b;border:1px solid #3f3f46;border-radius:12px;padding:22px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mh h2{font-size:16px;font-weight:600;color:#f1f5f9}
.xb{background:none;border:none;color:#71717a;cursor:pointer;font-size:22px;line-height:1;padding:0}
#msg-input{flex:1;width:auto !important;min-width:0}
input,select,textarea{width:100%;background:#27272a;border:1px solid #3f3f46;border-radius:7px;padding:8px 11px;color:#f1f5f9;font-size:12px;outline:none;box-sizing:border-box;font-family:inherit}
textarea{min-height:60px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:#f43f5e66}
.fi{margin-bottom:12px}.fi label{display:block;font-size:11px;color:#a1a1aa;margin-bottom:3px;font-weight:500}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.pb{background:#f43f5e;border:none;color:#fff;border-radius:7px;padding:10px 18px;font-size:12px;font-weight:600;cursor:pointer;width:100%;margin-top:4px}
.ab{background:#f43f5e;border:none;color:#fff;border-radius:7px;padding:7px 14px;font-size:11px;font-weight:600;cursor:pointer}
.gb{background:#27272a;border:1px solid #3f3f46;color:#d4d4d8;border-radius:7px;padding:7px 14px;font-size:11px;font-weight:500;cursor:pointer}
.tb{background:#38bdf820;border:1px solid #38bdf844;color:#38bdf8;border-radius:7px;padding:7px 14px;font-size:11px;font-weight:500;cursor:pointer}
.db{background:none;border:none;color:#52525b;cursor:pointer;font-size:13px;padding:2px 5px}
.eb{background:none;border:1px solid #3f3f46;color:#a1a1aa;border-radius:5px;padding:2px 8px;font-size:11px;cursor:pointer}
.pg{padding:22px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.ph h2{font-size:17px;font-weight:700;color:#f1f5f9}
.ph-btns{display:flex;gap:8px;flex-wrap:wrap}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px;margin-bottom:18px}
.kp{background:#18181b;border:1px solid #27272a;border-radius:9px;padding:12px 14px}
.kl{font-size:10px;color:#71717a;text-transform:uppercase;letter-spacing:.05em;font-weight:500;margin-bottom:4px}
.kv{font-size:18px;font-weight:700;color:#f1f5f9}.ks{font-size:10px;color:#52525b;margin-top:2px}
.cd{background:#18181b;border:1px solid #27272a;border-radius:9px;padding:14px;margin-bottom:14px}
.ct{font-size:12px;font-weight:600;color:#a1a1aa;margin-bottom:10px}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{text-align:left;padding:7px 9px;color:#71717a;font-weight:500;border-bottom:1px solid #27272a;white-space:nowrap;background:#18181b;position:sticky;top:0}
tbody tr{border-bottom:1px solid #1f1f23}tbody tr:nth-child(even){background:#1a1a1e}
tbody td{padding:7px 9px;color:#d4d4d8;white-space:nowrap}
td.hi{color:#f43f5e;font-weight:500}td.gr{color:#34d399;font-weight:500}
.emp{text-align:center;padding:36px 0;color:#52525b}
.dt{width:100%;border-collapse:collapse}.dt td{padding:7px 13px;font-size:12px}
.dsec td{padding:9px 13px 3px;font-size:9px;color:#52525b;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.dsum{background:#1f1f23}.dsum td{font-weight:700;font-size:13px}
.dfin{background:#27272a}.dfin td{font-weight:700;font-size:14px}
.tg{background:#27272a;border-radius:10px;padding:1px 9px;color:#f43f5e;font-weight:600;display:inline-block}
.ok{color:#34d399;font-weight:600}.wn{color:#fbbf24;font-weight:600}.bd{color:#f87171;font-weight:600}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:7px 9px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:#71717a;font-size:11px;margin-bottom:1px;text-align:left}
.nb.on{background:rgba(244,63,94,.12);color:#f43f5e;font-weight:600}
.ni{font-size:13px}
.srow{display:flex;gap:9px;margin-bottom:13px;flex-wrap:wrap;align-items:center}
.srow input,.srow select{flex:none}
.srow input{flex:1;min-width:180px}
.srow select{width:auto}
.ox{overflow-x:auto}
.com-info{background:#1f1f23;border-radius:7px;padding:9px 13px;margin-bottom:12px;font-size:12px;border:1px solid #27272a}
/* AGENDA */
.agn-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.agn-date{font-size:15px;font-weight:700;color:#f1f5f9;min-width:140px;text-align:center}
.agn-wrap{overflow-x:auto;border:1px solid #27272a;border-radius:9px}
.agn-grid{display:grid;min-width:700px}
.agn-th{background:#18181b;padding:8px 10px;font-size:11px;font-weight:600;color:#a1a1aa;border-bottom:1px solid #27272a;text-align:center;border-right:1px solid #1f1f23}
.agn-time{background:#111115;padding:6px 10px;font-size:10px;color:#52525b;border-right:1px solid #27272a;border-bottom:1px solid #1f1f23;text-align:right;min-width:52px;white-space:nowrap}
.agn-slot{border-right:1px solid #1f1f23;border-bottom:1px solid #1f1f23;min-height:38px;padding:2px;cursor:pointer}
.agn-slot:hover{background:#1f1f23}
.agn-appt{border-radius:5px;padding:3px 6px;font-size:10px;font-weight:500;line-height:1.3;cursor:pointer;overflow:hidden}
.agn-empty{font-size:9px;color:#3f3f46;text-align:center;padding-top:10px}
.status-conf{background:rgba(52,211,153,.15);border-left:3px solid #34d399;color:#34d399}
.status-pend{background:rgba(251,191,36,.12);border-left:3px solid #fbbf24;color:#fbbf24}
.status-canc{background:rgba(248,113,113,.12);border-left:3px solid #f87171;color:#f87171}
/* BD */
.bd-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.bd-tab{background:#27272a;border:1px solid #3f3f46;color:#a1a1aa;border-radius:7px;padding:6px 14px;font-size:11px;cursor:pointer}
.bd-tab.on{background:#f43f5e;border-color:#f43f5e;color:#fff;font-weight:600}
.exp-btn{background:#27272a;border:1px solid #3f3f46;color:#34d399;border-radius:7px;padding:6px 14px;font-size:11px;cursor:pointer;font-weight:500}
/* IMPORT MODAL */
.imp-list{max-height:240px;overflow-y:auto;background:#27272a;border:1px solid #3f3f46;border-radius:7px;padding:8px}
.imp-item{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:11px;color:#d4d4d8;border-bottom:1px solid #1f1f23}
.imp-item:last-child{border-bottom:none}
.imp-item input[type=checkbox]{width:auto;accent-color:#f43f5e}
.mtabs{display:flex;gap:6px;margin-bottom:14px}
.mtab{background:#27272a;border:1px solid #3f3f46;color:#a1a1aa;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer}
.mtab.on{background:#f43f5e;border-color:#f43f5e;color:#fff;font-weight:600}
.bkp-bar{padding:6px 8px;border-top:1px solid #1f1f23;background:#0f0f12;display:flex;flex-wrap:wrap;gap:3px}
.bkp-bar button{flex:1 1 auto;padding:5px 4px;border-radius:5px;font-size:9px;font-weight:600;cursor:pointer;border:none;min-width:0}
.bkp-save{background:#34d39922;color:#34d399;border:1px solid #34d39944 !important}
.bkp-load{background:#38bdf822;color:#38bdf8;border:1px solid #38bdf844 !important}
.bkp-toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#34d399;color:#000;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s}

/* LOGIN */
#login-screen{height:100vh;display:flex;align-items:center;justify-content:center;background:#09090b;padding:16px}
.login-box{width:100%;max-width:340px;background:#18181b;border:1px solid #27272a;border-radius:14px;padding:32px 28px}
.login-box h1{font-size:18px;font-weight:700;color:#f43f5e;margin-bottom:2px;text-align:center}
.login-box .sub{font-size:11px;color:#52525b;text-align:center;margin-bottom:24px}
.login-err{background:#f43f5e18;border:1px solid #f43f5e44;color:#f87171;font-size:11px;padding:8px 11px;border-radius:7px;margin-bottom:12px;display:none}
#login-loading{display:none;text-align:center;font-size:11px;color:#71717a;margin-top:8px}
/* TOPBAR / USER BADGE */
.user-badge{padding:10px 12px;border-top:1px solid #1f1f23;border-bottom:1px solid #1f1f23;display:flex;align-items:center;justify-content:space-between;gap:8px}
.user-badge .nm{font-size:11px;color:#d4d4d8;font-weight:600}
.user-badge .rl{font-size:9px;color:#52525b;text-transform:uppercase;letter-spacing:.04em}
.user-badge button{background:none;border:1px solid #3f3f46;color:#71717a;border-radius:6px;padding:4px 9px;font-size:10px;cursor:pointer}
/* REQUESTS TAB */
.req-card{background:#18181b;border:1px solid #27272a;border-radius:10px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.req-info{flex:1;min-width:200px}
.req-info .nm{font-size:13px;font-weight:600;color:#f1f5f9}
.req-info .meta{font-size:11px;color:#a1a1aa;margin-top:3px}
.req-badge{font-size:10px;padding:2px 9px;border-radius:10px;font-weight:600}
.req-pend{background:#fbbf2420;color:#fbbf24}
.req-conf{background:#34d39920;color:#34d399}
.req-canc{background:#f8717120;color:#f87171}
.req-actions{display:flex;gap:6px}
.req-actions button{border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer}
.req-actions .ok{background:#34d399;color:#000}
.req-actions .no{background:#27272a;color:#f87171;border:1px solid #3f3f46}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#34d399;display:inline-block;margin-right:5px;animation:pulse 2s infinite}

.lead-board{display:flex;gap:11px;overflow-x:auto;padding-bottom:8px}
.lead-col{background:#111115;border:1px solid #1f1f23;border-radius:10px;min-width:225px;max-width:225px;flex-shrink:0}
.lead-col-hd{padding:10px 12px;border-bottom:1px solid #1f1f23;font-size:11px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.lead-col-bd{padding:8px;min-height:60px;max-height:560px;overflow-y:auto;transition:background .12s}
.lead-col-bd.drag-over{background:#27272a;box-shadow:inset 0 0 0 2px #f43f5e}
.lead-card{background:#18181b;border:1px solid #27272a;border-left-width:3px;border-radius:7px;padding:9px 10px;margin-bottom:8px;cursor:grab}
.lead-card.dragging{opacity:.4}
.lead-card:hover{border-color:#3f3f46}
.lead-card .nm{font-size:12px;font-weight:600;color:#f1f5f9}
.lead-card .it{font-size:10px;color:#a1a1aa;margin-top:2px}
.lead-card .mt{font-size:9px;color:#52525b;margin-top:5px;display:flex;justify-content:space-between;align-items:center}
.lead-due{color:#f87171 !important;font-weight:700}
.lead-badge{font-size:9px;padding:1px 7px;border-radius:8px;font-weight:600}
.lead-today-row{background:#18181b;border:1px solid #27272a;border-radius:9px;padding:11px 14px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.lead-today-actions{display:flex;gap:6px;flex-wrap:wrap}
.lead-today-actions button{border:none;border-radius:6px;padding:6px 11px;font-size:10px;font-weight:600;cursor:pointer}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes coinFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* MOBILE TOGGLE ŌĆö hidden on desktop by default */
#mb-toggle{display:none;position:fixed;top:12px;left:12px;z-index:1001;background:#18181b;border:1px solid #3f3f46;color:#f1f5f9;width:38px;height:38px;border-radius:9px;font-size:18px;cursor:pointer;align-items:center;justify-content:center}
#sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:998}
#sb-backdrop.show{display:block}

@media (max-width:860px){
  html,body{overflow:auto}
  #app{flex-direction:column;height:100vh;position:relative}
  #mb-toggle{display:flex}
  #sb{position:fixed;top:0;left:0;height:100vh;width:240px;max-width:80vw;z-index:999;
    transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 24px rgba(0,0,0,.5)}
  #sb.open{transform:translateX(0)}
  #ct{width:100%;padding-top:54px}
  .pg{padding:14px}
  .ph{margin-bottom:14px}
  .ph h2{font-size:15px}
  .g2,.g3{grid-template-columns:1fr}
  .cg{grid-template-columns:1fr}
  .kg{grid-template-columns:repeat(2,1fr)}
  .kp{padding:10px 11px}
  .kv{font-size:15px}
  table{font-size:10px}
  thead th{padding:6px 7px}
  tbody td{padding:6px 7px}
  .mb{padding:16px;max-width:94vw;width:94vw}
  .srow{flex-direction:column;align-items:stretch}
  .srow input,.srow select{width:100%;min-width:0}
  .agn-date{min-width:0;font-size:13px}
  .agn-nav{gap:8px}
  .req-card{flex-direction:column;align-items:flex-start}
  .req-actions{width:100%}
  .req-actions button{flex:1}
  .user-badge{padding:9px 10px}
  .login-box{padding:26px 20px}
}
@media (max-width:420px){
  .kg{grid-template-columns:1fr 1fr}
  .pg{padding:10px}
}
</style>
</head>

/* ŌöĆ LEADS / COMERCIAL ŌöĆ */

var LEAD_STAGE_LABELS={lead:"Lead",contato:"Contato feito",interesse:"Interesse identificado",apresentacao:"Apresenta\u00e7\u00e3o",agendado:"Agendado",convertido:"Convertido",perdido:"Perdido"};

/* SECONDARY AUTH ŌĆö verifies admin credentials without disrupting current session */
var _secondaryAuth=null;
function getSecondaryAuth(){
  if(!_secondaryAuth){
    var sApp;
    try{sApp=firebase.app("secondary");}catch(e){sApp=firebase.initializeApp(firebaseConfig,"secondary");}
    _secondaryAuth=sApp.auth();
  }
  return _secondaryAuth;
}
function verifyAdminPassword(email,pass,onSuccess,onError){
  var sAuth=getSecondaryAuth();
  sAuth.signInWithEmailAndPassword(email,pass).then(function(cred){
    var uid=cred.user.uid;
    db.collection("usuarios").doc(uid).get().then(function(doc){
      sAuth.signOut();
      if(doc.exists&&doc.data().role==="admin"){onSuccess();}
      else{onError("Este usu\u00e1rio n\u00e3o tem permiss\u00e3o de administrador.");}
    }).catch(function(){sAuth.signOut();onError("Erro ao verificar permiss\u00e3o.");});
  }).catch(function(){onError("E-mail ou senha incorretos.");});
}
function openAdminAuthModal(onSuccess){
  omod(mhdr("Confirma\u00e7\u00e3o de Administrador")
    +'<div style="font-size:11px;color:#a1a1aa;margin-bottom:14px">Para excluir este registro, informe o e-mail e a senha de um administrador.</div>'
    +'<div id="aa-err" style="display:none;background:#f43f5e18;border:1px solid #f43f5e44;color:#f87171;font-size:11px;padding:8px 11px;border-radius:7px;margin-bottom:12px"></div>'
    +'<div class="fi"><label>E-mail do Administrador</label><input type="email" id="aa-email" placeholder="admin@studioar.com"></div>'
    +'<div class="fi"><label>Senha</label><input type="password" id="aa-pass"></div>'
    +'<button class="pb" id="aa-btn">Confirmar e Excluir</button>');
  document.getElementById("aa-pass").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("aa-btn").click();});
  document.getElementById("aa-btn").onclick=function(){
    var email=document.getElementById("aa-email").value.trim();
    var pass=document.getElementById("aa-pass").value;
    var errEl=document.getElementById("aa-err");
    errEl.style.display="none";
    if(!email||!pass){errEl.textContent="Preencha e-mail e senha.";errEl.style.display="block";return;}
    var btn=document.getElementById("aa-btn");btn.disabled=true;btn.textContent="Verificando...";
    verifyAdminPassword(email,pass,function(){
      cmod();onSuccess();
    },function(msg){
      errEl.textContent=msg;errEl.style.display="block";
      btn.disabled=false;btn.textContent="Confirmar e Excluir";
    });
  };
}

function slug(s){return String(s||"").trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^A-Z0-9]+/g,"_").replace(/^_+|_+$/g,"");}

function doLogin(){
  var email=document.getElementById("lg-email").value.trim();
  var pass=document.getElementById("lg-pass").value;
  var errEl=document.getElementById("login-err");
  errEl.style.display="none";
  if(!email||!pass){errEl.textContent="Preencha e-mail e senha.";errEl.style.display="block";return;}
  document.getElementById("login-loading").style.display="block";
  auth.signInWithEmailAndPassword(email,pass).catch(function(err){
    document.getElementById("login-loading").style.display="none";
    var msg="E-mail ou senha incorretos.";
    if(err.code==="auth/too-many-requests")msg="Muitas tentativas. Aguarde um momento.";
    if(err.code==="auth/network-request-failed")msg="Falha de conex\u00e3o. Verifique sua internet.";
    errEl.textContent=msg;errEl.style.display="block";
  });
}
function doLogout(){
  _listeners.forEach(function(unsub){try{unsub();}catch(e){}});
  _listeners=[];
  auth.signOut();
}
auth.onAuthStateChanged(function(user){
  if(user){
    db.collection("usuarios").doc(user.uid).get().then(function(doc){
      if(!doc.exists){
        document.getElementById("login-err").textContent="Usu\u00e1rio sem perfil configurado. Avise o administrador.";
        document.getElementById("login-err").style.display="block";
        document.getElementById("login-loading").style.display="none";
        auth.signOut();
        return;
      }
      var data=doc.data();
      CURRENT_USER={uid:user.uid,email:user.email,role:data.role,nome:data.nome||user.email,profName:data.profName||null};
      document.getElementById("login-screen").style.display="none";
      document.getElementById("app").style.display="flex";
      document.getElementById("login-loading").style.display="none";
      var allowedTabs=ROLE_TABS[CURRENT_USER.role]||[];
      S.tab=allowedTabs.indexOf(S.tab)>=0?S.tab:(allowedTabs[0]||"dashboard");
      setupListeners();
    });
  }else{
    CURRENT_USER=null;
    document.getElementById("login-screen").style.display="flex";
    document.getElementById("app").style.display="none";
  }
});

function getRecipe(svc){
  if(!svc)return null;
  // busca exata primeiro
  if(RECIPE_MAP[svc])return RECIPE_MAP[svc];
  // busca case-insensitive
  var upper=svc.toUpperCase();
  var keys=Object.keys(RECIPE_MAP);
  for(var i=0;i<keys.length;i++){if(keys[i].toUpperCase()===upper)return RECIPE_MAP[keys[i]];}
  return null;
}

function deductStock(produtoNome,qtd){
  var docId=slug(produtoNome);

function bottleSvg(pct,color){

    +'<rect x="11" y="0" width="8" height="6" rx="1" fill="#52525b"/>'

}

function doImportJSON(inp){
  if(!inp.files||!inp.files[0])return;
  if(!confirm("Isto vai enviar os dados do arquivo de backup para o Firebase (nuvem). Use apenas UMA vez, na migra\u00e7\u00e3o inicial. Continuar?"))return;
  var reader=new FileReader();
  reader.onload=function(e){
    showToast("\u23f3 Migrando para o Firebase, aguarde...","#38bdf8");
    try{
      var p=JSON.parse(e.target.result);
      var batch=db.batch();var ops=0;
      function add(ref,data){batch.set(ref,data,{merge:true});ops++;if(ops%450===0){batch.commit();batch=db.batch();}}
      (p.svc||[]).forEach(function(r){add(db.collection("servicos").doc(r.id),r);});
      (p.prd||[]).forEach(function(r){add(db.collection("produtos").doc(r.id),r);});
      (p.exp||[]).forEach(function(r){add(db.collection("despesas").doc(r.id),r);});
      (p.adv||[]).forEach(function(r){add(db.collection("adiantamentos").doc(r.id),r);});
      (p.agn||[]).forEach(function(r){add(db.collection("agendamentos").doc(r.id),r);});
      (p.contacts||[]).forEach(function(r){var did=slug(r.nome);if(did)add(db.collection("contatos").doc(did),Object.assign({},r,{id:did}));});
      if(p.pl)add(db.collection("config").doc("prolabore"),{values:p.pl});
      if(p.profs)add(db.collection("config").doc("profissionais"),{list:p.profs});
      batch.commit().then(function(){
        showToast("\u2705 Migra\u00e7\u00e3o conclu\u00edda! "+ops+" registros enviados.");
      }).catch(function(err){showToast("\u274c Erro: "+err.message,"#f43f5e");});
    }catch(err){showToast("\u274c Arquivo inv\u00e1lido","#f43f5e");}
    inp.value="";
  };
  reader.readAsText(inp.files[0]);
}

function bvC(items,color){
  if(!items||!items.length)return'<p style="color:#52525b;text-align:center;padding:20px 0">Sem dados</p>';
  var W=380,H=175,pad=26,bh=H-36;
  var mx=Math.max.apply(null,items.map(function(d){return d.v;}))||1;
  var bw=Math.max(4,Math.floor((W-pad)/items.length)-4);
  var bars=items.map(function(d,i){
    var h=Math.max(2,Math.round((d.v/mx)*bh));
    var x=pad+i*Math.floor((W-pad)/items.length)+2;
    var y=H-26-h;
    var vs=d.v>9999?(Math.round(d.v/1000)+"k"):String(Math.round(d.v));
    return'<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+h+'" fill="'+color+'" rx="2"/>'
      +'<text x="'+(x+bw/2)+'" y="'+(y-3)+'" font-size="8" fill="#a1a1aa" text-anchor="middle">'+vs+'</text>'
      +'<text x="'+(x+bw/2)+'" y="'+(H-6)+'" font-size="8" fill="#71717a" text-anchor="middle">'+es(String(d.n||"").slice(0,7))+'</text>';
  }).join("");
  var grids=[0,0.5,1].map(function(p){
    var y=H-26-Math.round(p*bh);
    return'<line x1="'+pad+'" y1="'+y+'" x2="'+W+'" y2="'+y+'" stroke="#27272a" stroke-dasharray="3 2"/>';
  }).join("");
  return'<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'">'+grids+bars+'</svg>';
}
function bhC(items,color,showQtd){
  if(!items||!items.length)return'<p style="color:#52525b;text-align:center;padding:16px 0">Sem dados</p>';
  var W=380,rh=24,lw=110,H=items.length*rh+8;
  var mx=Math.max.apply(null,items.map(function(d){return d.v;}))||1;
  var bars=items.map(function(d,i){
    var bw=Math.max(2,Math.round((d.v/mx)*(W-lw-70)));
    var y=i*rh+4,lbl=String(d.n||"").slice(0,15);
    var vs=d.v>9999?(Math.round(d.v/1000)+"k"):String(Math.round(d.v));
    var qtdTxt=showQtd&&d.q?'<text x="'+(lw+bw+4+35)+'" y="'+(y+14)+'" font-size="8" fill="#52525b">('+d.q+'x)</text>':"";
    return'<text x="'+(lw-4)+'" y="'+(y+14)+'" font-size="9" fill="#71717a" text-anchor="end">'+es(lbl)+'</text>'
      +'<rect x="'+lw+'" y="'+(y+3)+'" width="'+bw+'" height="15" fill="'+color+'" rx="2"/>'
      +'<text x="'+(lw+bw+4)+'" y="'+(y+14)+'" font-size="9" fill="#a1a1aa">'+vs+'</text>'+qtdTxt;
  }).join("");
  return'<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'">'+bars+'</svg>';
}
function lnC(items){
  if(!items||items.length<2)return'<p style="color:#52525b;text-align:center;padding:16px 0">Sem dados</p>';
  var W=360,H=130,pL=8,pB=18,bh=H-pB-8;
  var mx=Math.max.apply(null,items.map(function(d){return d.v;}))||1;
  var pts=items.map(function(d,i){
    var x=pL+(i/(items.length-1))*(W-pL-6);
    var y=8+(1-d.v/mx)*bh;
    return x.toFixed(1)+","+y.toFixed(1);
  }).join(" ");
  var dots=items.map(function(d,i){
    var x=pL+(i/(items.length-1))*(W-pL-6);
    var y=8+(1-d.v/mx)*bh;
    return'<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="3" fill="#38bdf8"/>';
  }).join("");
  var grids=[0,0.5,1].map(function(p){
    var y=8+(1-p)*bh;
    return'<line x1="0" y1="'+y.toFixed(1)+'" x2="'+W+'" y2="'+y.toFixed(1)+'" stroke="#27272a" stroke-dasharray="3 2"/>';
  }).join("");
  var step=Math.ceil(items.length/6);
  var lbls=items.filter(function(_,i){return i%step===0;}).map(function(d){
    var i=items.indexOf(d);var x=pL+(i/(items.length-1))*(W-pL-6);
    return'<text x="'+x.toFixed(1)+'" y="'+(H-2)+'" font-size="8" fill="#71717a" text-anchor="middle">'+es(d.d)+'</text>';
  }).join("");
  return'<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'">'+grids
    +'<polyline points="'+pts+'" fill="none" stroke="#38bdf8" stroke-width="2"/>'+dots+lbls+'</svg>';
}
function piC(items){
  if(!items||!items.length)return'<p style="color:#52525b;text-align:center;padding:16px 0">Sem dados</p>';
  var tot=items.reduce(function(s,d){return s+d.v;},0)||1;
  var cx=72,cy=66,r=48,ang=-Math.PI/2,sl="";
  items.forEach(function(d,i){
    var a=(d.v/tot)*2*Math.PI,ea=ang+a;
    var x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
    var x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
    var la=a>Math.PI?1:0,ma=ang+a/2;
    var lx=cx+(r+18)*Math.cos(ma),ly=cy+(r+16)*Math.sin(ma);
    var pct=Math.round(d.v/tot*100);
    sl+='<path d="M '+cx+' '+cy+' L '+x1.toFixed(1)+' '+y1.toFixed(1)+' A '+r+' '+r+' 0 '+la+' 1 '+x2.toFixed(1)+' '+y2.toFixed(1)+' Z" fill="'+CORES[i%CORES.length]+'"/>';
    if(pct>5)sl+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" font-size="8" fill="#d4d4d8" text-anchor="middle">'+es(String(d.n||"").slice(0,9))+'</text>'
      +'<text x="'+lx.toFixed(1)+'" y="'+(ly+10).toFixed(1)+'" font-size="8" fill="#a1a1aa" text-anchor="middle">'+d.v+' ('+pct+'%)</text>';
    ang=ea;
  });
  return'<svg viewBox="0 0 290 138" width="100%" height="138">'+sl+'</svg>';
}

  var captacao=document.getElementById("ms-ca").value;
  var tel=document.getElementById("ms-tel").value;

  var temProf=itens.every(function(it){return it.profs.length>0;});

  // validar pagamentos
  var pgtos=_pgItems.filter(function(pg){return pg.forma&&pg.valor!=="";});
  var totalPgto=pgtos.reduce(function(s,pg){return s+(parseFloat(pg.valor)||0);},0);
  var totalSvc=itens.reduce(function(s,it){return s+(parseFloat(it.valor)||0);},0);

  // forma de pagamento principal (primeira)
  var formaPrimaria=(pgtos[0]&&pgtos[0].forma)||"PIX";

  // sess├Żo ID para agrupar m├║ltiplos servi├¦os
  var sessaoId=uid();

  itens.forEach(function(it,idx){
    var recId=uid();
    var rec={id:recId,sessaoId:sessaoId,date:dataAtend,valor:parseFloat(it.valor)||0,
      profissionais:it.profs,numProfs:it.profs.length,trabalho:it.trabalho,
      formaPagamento:formaPrimaria,pagamentos:pgtos,
      taxaComissao:autoTax(it.profs.length),
      cliente:cli,captacao:captacao,
      telefone:tel,email:email,nascimento:nasc,endereco:end,
      custoMaterial:parseFloat(it.custo)||0,observacoes:idx===0?obs:"",
      desconto:desconto,ehSinal:ehSinal,sinalDesc:ehSinal?sinalDesc:"",sinalUsado:false,
      pagamento:"pendente",createdBy:CURRENT_USER?CURRENT_USER.role:""};
    var recipeSel=getRecipeSelectionsIdx(it.trabalho,idx);

    db.collection("servicos").doc(recId).set(rec);
    if(idx===0)updateContactAfterSave(rec);
  });

  // marcar sinal como usado se aplicado
  if(sinalAplicado){db.collection("servicos").doc(sinalAplicado).update({sinalUsado:true,sinalUsadoEm:dataAtend});}

  showToast("\u2705 "+itens.length+" servi\u00e7o(s) lan\u00e7ados para "+cli+"!");
  cmod();
}

function openRankingSettings(){
  var profs=getProfs();

    var checked=excl.indexOf(p)<0;
    var sid=p.replace(/[^a-zA-Z0-9]/g,"_");
    return'<label style="display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid #1f1f23;font-size:12px;color:#d4d4d8;cursor:pointer">'

      +'<span style="flex:1">'+es(p)+'</span>'
      +'<span id="rk-status-'+sid+'" style="font-size:9px;color:'+(checked?"#34d399":"#71717a")+'">'+(checked?"PARTICIPA":"FORA DO RANKING")+'</span>'
      +'</label>';
  }).join("");
  omod(mhdr("\uD83C\uDFC6 Configurar Ranking de Profissionais")
    +'<div style="font-size:11px;color:#a1a1aa;margin-bottom:12px">Marque quem participa do ranking (baseado em comiss\u00e3o de servi\u00e7os + produtos). Equipe administrativa geralmente fica de fora.</div>'
    +'<div class="ox" style="max-height:300px;overflow-y:auto;margin-bottom:14px">'+rows+'</div>'
    +'<button class="pb" onclick="saveRankingSettings()">Salvar</button>');
  document.querySelectorAll('[data-rk-sid]').forEach(function(cb){
    cb.addEventListener("change",function(){
      var sid=this.dataset.rkSid;
      var statusEl=document.getElementById("rk-status-"+sid);
      if(!statusEl)return;
      if(this.checked){statusEl.textContent="PARTICIPA";statusEl.style.color="#34d399";}
      else{statusEl.textContent="FORA DO RANKING";statusEl.style.color="#71717a";}
    });
  });
}
function saveRankingSettings(){
  var profs=getProfs();
  var excluded=[];
  profs.forEach(function(p){
    var sid=p.replace(/[^a-zA-Z0-9]/g,"_");
    var cb=document.getElementById("rk-"+sid);
    if(cb&&!cb.checked)excluded.push(p);
  });
  db.collection("config").doc("rankingExcluidos").set({nomes:excluded})
    .then(function(){showToast("\u2705 Ranking atualizado!");cmod();})

function doImportRDFile(inp){
  if(!inp.files||!inp.files[0])return;
  var prog=document.getElementById("rd-progress");
  if(prog)prog.textContent="Lendo arquivo...";
  var reader=new FileReader();
  reader.onload=function(e){
    var text=String(e.target.result).replace(/^\uFEFF/,"");
    var lines=text.split(/\r?\n/).filter(function(l){return l.trim().length>0;});
    if(prog)prog.textContent="Importando "+(lines.length-1)+" contatos, aguarde...";
    var batch=db.batch();var added=0,skipped=0,ops=0;
    lines.forEach(function(line,i){
      if(i===0&&line.toLowerCase().indexOf("docid")>=0)return;
      var parts=line.split(";");
      var docId=(parts[0]||"").trim();
      var nome=(parts[1]||"").trim();
      if(!docId||!nome||nome.length<2){skipped++;return;}
      var ref=db.collection("contatos").doc(docId);
      var rec={id:docId,nome:nome,telefone:(parts[2]||"").trim(),email:(parts[3]||"").trim(),
        captacao:(parts[4]||"").trim(),cidade:(parts[5]||"").trim(),instagram:(parts[6]||"").trim(),
        dataCadastro:(parts[7]||"").trim()||hj(),fonte:"RD Station CRM"};
      batch.set(ref,rec,{merge:true});
      added++;ops++;
      if(ops%450===0){batch.commit();batch=db.batch();}
    });
    batch.commit().then(function(){
      if(prog)prog.textContent="";
      showToast("\u2705 "+added+" contatos importados do RD Station!"+(skipped?(" ("+skipped+" ignorados)"):""));
      cmod();
    }).catch(function(err){
      if(prog)prog.textContent="Erro: "+err.message;
      showToast("\u274c Erro ao importar: "+err.message,"#f43f5e");
    });
  };
  reader.readAsText(inp.files[0],"UTF-8");
}

var _cliTimer=null;

function lookupClientMatches(val){
  var q=(val||"").trim().toLowerCase();if(q.length<2)return[];
  var qDigits=q.replace(/\D/g,"");
  var seen={};var out=[];
  function consider(rec){
    var keyPhone=(rec.telefone||"").replace(/\D/g,"");
    var key=keyPhone||("n_"+rec.nome.toUpperCase());
    if(seen[key])return;
    seen[key]=1;out.push(rec);
  }
  var sorted=D.svc.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  sorted.forEach(function(r){
    if(!r.cliente)return;
    var nm=r.cliente.toLowerCase()===q;
    var ph=qDigits.length>=6&&r.telefone&&r.telefone.replace(/\D/g,"").indexOf(qDigits)>=0;
    if(nm||ph)consider({nome:r.cliente,telefone:r.telefone||"",email:r.email||"",endereco:r.endereco||"",nascimento:r.nascimento||"",captacao:r.captacao||"",ultima:r.date});
  });
  D.contacts.forEach(function(cx){
    var nm=cx.nome&&cx.nome.toLowerCase()===q;
    var ph=qDigits.length>=6&&cx.telefone&&cx.telefone.replace(/\D/g,"").indexOf(qDigits)>=0;
    if(nm||ph)consider({nome:cx.nome,telefone:cx.telefone||"",email:cx.email||"",endereco:cx.endereco||"",nascimento:cx.nascimento||"",captacao:cx.captacao||""});
  });
  return out;
}
function lookupClient(val){var m=lookupClientMatches(val);return m.length?m[0]:null;}

  if(cl.captacao){var ca=document.getElementById(px+"-ca");if(ca&&ca.value==="CLIENTE")ca.value=cl.captacao;}
  var info=document.getElementById(px+"-cli-info");
  if(info&&cl.nome)info.innerHTML='<span style="color:#34d399">&#10003; Cliente encontrada &#8212; dados preenchidos</span>';
  var fidEl=document.getElementById(px+"-fidelidade");

  if(px==="ms"&&cl.nome){
    var hist=D.svc.filter(function(r){return r.cliente&&r.cliente.trim().toUpperCase()===cl.nome.trim().toUpperCase();}).sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,5);

          +'<div style="font-size:10px;font-weight:600;color:#71717a;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">&#128203; \u00daltimos atendimentos</div>'
          +hist.map(function(r){
            var profs=(r.profissionais||[r.profissional]).filter(Boolean).join(", ");
            return'<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #27272a;font-size:11px">'
              +'<div><span style="color:#a1a1aa">'+fdt(r.date)+'</span> <span style="color:#f1f5f9;margin-left:6px">'+es(r.trabalho)+'</span>'
              +(r.observacoes?'<span style="color:#52525b;margin-left:4px;font-size:10px">ŌĆö '+es(r.observacoes.slice(0,30))+'</span>':'')
              +'</div>'

/* BUILD CLIENTS MAP */
function buildCliMap(){
  var cmap={};
  D.svc.forEach(function(r){
    if(!r.cliente)return;
    var k=r.cliente.trim().toUpperCase();
    if(!cmap[k])cmap[k]={nome:r.cliente,tel:r.telefone||"",email:r.email||"",end:r.endereco||"",nasc:r.nascimento||"",cap:r.captacao||"",datas:[],svcs:[],qtd:0,gasto:0,obs:[]};
    cmap[k].datas.push(r.date);cmap[k].svcs.push(r.trabalho);cmap[k].qtd++;cmap[k].gasto+=r.valor;
    if(r.telefone)cmap[k].tel=r.telefone;if(r.email)cmap[k].email=r.email;
    if(r.endereco)cmap[k].end=r.endereco;if(r.nascimento)cmap[k].nasc=r.nascimento;
    if(r.observacoes)cmap[k].obs.push(r.observacoes);
  });
  D.contacts.forEach(function(c){
    var k=c.nome.trim().toUpperCase();
    if(!cmap[k]){cmap[k]={nome:c.nome,tel:c.telefone||"",email:c.email||"",end:c.endereco||"",nasc:c.nascimento||"",cap:c.captacao||"",datas:[],svcs:[],qtd:0,gasto:0,obs:[],contatoOnly:true,fonte:c.fonte};}
    else{if(c.telefone&&!cmap[k].tel)cmap[k].tel=c.telefone;if(c.email&&!cmap[k].email)cmap[k].email=c.email;}
  });
  return cmap;
}
function clientRanking(){
  var cmap=buildCliMap();
  var arr=Object.keys(cmap).map(function(k){return{key:k,nome:cmap[k].nome,gasto:cmap[k].gasto};});
  arr.sort(function(a,b){return b.gasto-a.gasto;});
  return arr;
}

function clientRanking(){
  var cmap=buildCliMap();
  var arr=Object.keys(cmap).map(function(k){return{key:k,nome:cmap[k].nome,gasto:cmap[k].gasto};});
  arr.sort(function(a,b){return b.gasto-a.gasto;});
  return arr;
}

/* ŌöĆ PROGRAMA DE FIDELIDADE ŌöĆ */
function getClientVisits(nome){
  var key=nome.trim().toUpperCase();
  return D.svc.filter(function(r){return r.cliente&&r.cliente.trim().toUpperCase()===key;}).length;
}
function fidelidadeStatus(nome){
  var cfg=getFidelidade();
  var visits=getClientVisits(nome);
  if(!visits)return null;
  var cycle=visits%cfg.visitas;
  var completed=Math.floor(visits/cfg.visitas);
  var next=cfg.visitas-cycle;
  return{visits:visits,cycle:cycle,next:next,completed:completed,meta:cfg.visitas,desconto:cfg.desconto,tipo:cfg.tipo};
}
function fidelidadeBadge(nome){
  var st=fidelidadeStatus(nome);
  if(!st)return"";
  var cfg=getFidelidade();
  var premio=cfg.tipo==="kit"?"­¤Äü Kit de produtos gr├Ītis":"­¤ÅĘ’ĖÅ "+cfg.desconto+"% de desconto";
  if(st.cycle===0&&st.completed>0){
    return'<div style="background:#f43f5e20;border:2px solid #f43f5e;border-radius:8px;padding:10px 13px;margin-bottom:10px;text-align:center">'
      +'<div style="font-size:15px;font-weight:700;color:#f43f5e">­¤Äē VOUCHER DISPON├ŹVEL!</div>'
      +'<div style="font-size:12px;color:#f1f5f9;margin-top:3px">'+es(nome)+' completou '+st.completed+'x o programa &mdash; '+premio+'</div>'
      +'<div style="font-size:10px;color:#71717a;margin-top:2px">Total de '+st.visits+' visitas ao Studio A R</div></div>';

  var pct=Math.round(st.cycle/st.meta*100);

  }).join("");
  return'<div style="background:#27272a;border-radius:8px;padding:9px 12px;margin-bottom:10px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">'
    +'<span style="font-size:11px;font-weight:600;color:#f1f5f9">­¤Æ│ Fidelidade</span>'
    +'<span style="font-size:11px;color:#a1a1aa">'+st.cycle+'/'+st.meta+' visitas &mdash; faltam '+st.next+'</span></div>'
    +'<div style="display:flex;gap:2px;width:100%">'+bars+'</div>'

function rDash(fsOrig,fpOrig,feOrig,faOrig){

  var dayStr="",isDay=S.day>0;
  if(isDay){
    var dd=S.day<10?"0"+S.day:String(S.day);

    dayStr=S.year+"-"+mm+"-"+dd;
    fs=fday(D.svc,dayStr);fp=fday(D.prd,dayStr);fe=fday(D.exp,dayStr);fa=fday(D.adv,dayStr);

  var vP=fpSal.reduce(function(s,r){return s+fl(r.valorUnitario*r.quantidade,r.formaPagamento||"PIX");},0);
  var cS=fpSal.reduce(function(s,r){return s+fl(r.valorUnitario*r.quantidade,r.formaPagamento||"PIX")*r.comissaoSalao;},0);
  var tD=fe.reduce(function(s,r){return s+r.valorPago;},0);
  var tA=fa.reduce(function(s,r){return s+r.valor;},0);
  var tC=fs.reduce(function(s,r){return s+cm(effVal(r),r.formaPagamento,r.taxaComissao);},0);
  var uniqCli=new Set(fs.map(function(r){return r.cliente;})).size;

  var titulo=isDay?("Dashboard \u2014 "+fdt(dayStr)):("Dashboard \u2014 "+MESES[S.month]+" "+S.year);

    var svcRows=fs.length?fs.map(function(r){return'<tr><td style="color:#f1f5f9;font-weight:500">'+es(r.cliente)+'</td><td>'+es(r.trabalho)+'</td><td>'+es((r.profissionais||[]).join(", "))+'</td><td class="hi">'+fmt(r.valor)+'</td><td>'+es(r.formaPagamento)+'</td>'+(r.observacoes?'<td style="color:#fbbf24;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+es(r.observacoes.slice(0,30))+'</td>':'<td>\u2014</td>')+'</tr>';}).join(""):'';

    +bottomRight+'</div></div>';
}

    +'<div class="kg">'+kp("Fat. Bruto",fmt(tB),fs.length+" atend.")+kp("Fat. L\u00edquido",fmt(tL),"Taxa maq.: "+fmt(tB-tL))+kp("Total Comiss\u00f5es",fmt(tC))+kp("Custo Material",fmt(tM))+kp("Descontos",fmt(tDesc))+(pendentes?kp('\uD83D\uDFE1 Pend. Pagamento',pendentes,"aguardando"):'')+'</div>'
    +(pendentes?'<div style="background:#fbbf2420;border:1px solid #fbbf2440;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:#fbbf24">&#9888; <strong>'+pendentes+' atendimento(s) com pagamento pendente</strong> &mdash; linhas em amarelo abaixo</div>':"")
    +'<div class="cd">'+tableHtml+'</div></div>';

function rPrd(fp){
  var fpSal=fp.filter(function(r){return!r.externa;}),fpExt=fp.filter(function(r){return r.externa;});
  var tVBruto=fpSal.reduce(function(s,r){return s+r.valorUnitario*r.quantidade;},0);
  var tV=fpSal.reduce(function(s,r){return s+fl(r.valorUnitario*r.quantidade,r.formaPagamento||"PIX");},0);
  var tMaqPrd=tVBruto-tV;
  var tVE=fpExt.reduce(function(s,r){return s+fl(r.valorUnitario*r.quantidade,r.formaPagamento||"PIX");},0);
  var cS=fpSal.reduce(function(s,r){return s+fl(r.valorUnitario*r.quantidade,r.formaPagamento||"PIX")*r.comissaoSalao;},0);
  var cols=[
    {k:"date",l:"Data",fn:function(r){return fdt(r.date);}},
    {k:"produto",l:"Produto",fn:function(r){return es(r.produto);}},
    {k:"quantidade",l:"Qtd"},
    {k:"vu",l:"V.Unit.",fn:function(r){return fmt(r.valorUnitario);}},
    {k:"tot",l:"V.Bruto",fn:function(r){return fmt(r.valorUnitario*r.quantidade);},hi:true},
    {k:"liq",l:"Fat.L\u00edq.",fn:function(r){return fmt(fl(r.valorUnitario*r.quantidade,r.formaPagamento||"PIX"));}},
    {k:"custo",l:"Custo",fn:function(r){return r.custo>0?fmt(r.custo):"\u2014";}},
    {k:"cliente",l:"Cliente",fn:function(r){return es(r.cliente||"");}},
    {k:"profissional",l:"Vendedor",fn:function(r){return es(r.profissional);}},
    {k:"formaPagamento",l:"Pagamento",fn:function(r){return es(r.formaPagamento||"");}},
    {k:"cs",l:"Com.Sal\u00e3o",fn:function(r){return fmt(r.valorUnitario*r.quantidade*r.comissaoSalao);}}
  ];
  return'<div class="pg"><div class="ph"><h2>Produtos \u2014 '+MESES[S.month]+' '+S.year+'</h2><button class="ab" onclick="openP()">\uFF0B Nova Venda</button></div>'
    +'<div class="kg">'+kp("Vendas Sal\u00e3o (Bruto)",fmt(tVBruto),fpSal.length+" itens")+kp("Fat. L\u00edquido",fmt(tV),"-"+fmt(tMaqPrd)+" maq.")+kp("Vendas Externas",fmt(tVE),fpExt.length+" itens")+kp("Com.Sal\u00e3o",fmt(cS))+'</div>'
    +'<div class="cd"><div class="ct">Vendas no Sal\u00e3o</div>'+tbl(fpSal,cols,"prd")+'</div>'
    +(fpExt.length?'<div class="cd"><div class="ct" style="color:#fbbf24">Vendas Externas</div>'+tbl(fpExt,cols,"prd")+'</div>':"")
    +'</div>';
}

function rPL(fs,fp,fa){
  var pl=getPL(),profs=getProfs();
  var myName=CURRENT_USER&&CURRENT_USER.role==="profissional"?CURRENT_USER.profName:null;
  var cByP={};
  fs.forEach(function(r){
    var ns=(r.profissionais||[r.profissional]).filter(function(n){return n;});
    if(!ns.length)ns=[r.profissional];
    var c=cm(effVal(r),r.formaPagamento,r.taxaComissao);
    ns.forEach(function(n){cByP[n]=(cByP[n]||0)+c;});
  });
  var cpByP={};fp.forEach(function(r){cpByP[r.profissional]=(cpByP[r.profissional]||0)+fl(r.valorUnitario*r.quantidade,r.formaPagamento||"PIX")*r.comissaoVendedor;});
  var aByP={};fa.forEach(function(r){aByP[r.colaborador]=(aByP[r.colaborador]||0)+r.valor;});
  var allActiveP=profs.filter(function(p){return(pl[p]||0)>0||(cByP[p]||0)>0;});

  /* RANKING ŌĆö apenas comiss\u00f5es (servi\u00e7os + produtos), sem pr\u00f3-labore; exclui equipe administrativa */
  var rkExcl=getRankingExcluded();
  var ranking=allActiveP.filter(function(p){return rkExcl.indexOf(p)<0;}).map(function(p){
    var cs=cByP[p]||0,cp=cpByP[p]||0;
    return{nome:p,total:cs+cp};
  }).filter(function(r){return r.total>0;}).sort(function(a,b){return b.total-a.total;});

  var activeP=allActiveP;
  if(myName)activeP=activeP.filter(function(p){return p===myName;});
  var tB=0,tCS=0,tCP=0,tA=0,tR=0;
  var rows=activeP.map(function(p){
    var base=pl[p]||0,cs=cByP[p]||0,cp=cpByP[p]||0,av=aByP[p]||0,tot=base+cs+cp,rec=tot-av;
    tB+=base;tCS+=cs;tCP+=cp;tA+=av;tR+=rec;
    return'<tr><td>'+es(p)+'</td><td>'+fmt(base)+'</td><td>'+fmt(cs)+'</td><td>'+fmt(cp)+'</td><td>'+fmt(tot)+'</td><td>'+fmt(av)+'</td><td class="hi">'+fmt(rec)+'</td></tr>';
  }).join("");

  /* RANKING DISPLAY */
  var rankingHtml="";
  if(ranking.length){
    if(myName){
      var myPos=ranking.findIndex(function(r){return r.nome===myName;})+1;
      if(myPos>0){
        var medal=myPos===1?"\uD83E\uDD47":myPos===2?"\uD83E\uDD48":myPos===3?"\uD83E\uDD49":"";
        rankingHtml='<div class="cd" style="text-align:center;padding:20px"><div class="ct" style="margin-bottom:8px">Sua Coloca\u00e7\u00e3o no M\u00eas</div>'
          +'<div style="font-size:34px;font-weight:800;color:#f43f5e">'+medal+' '+myPos+'\u00ba lugar</div>'
          +'<div style="font-size:11px;color:#71717a;margin-top:6px">de '+ranking.length+' profissionais ativos</div></div>';
      }
    }else{
      var rkRows=ranking.map(function(r,i){
        var medal=i===0?"\uD83E\uDD47":i===1?"\uD83E\uDD48":i===2?"\uD83E\uDD49":(i+1)+"\u00ba";
        var barW=ranking[0].total>0?Math.round(r.total/ranking[0].total*100):0;
        return'<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #1f1f23">'
          +'<div style="width:34px;font-size:13px;font-weight:700;color:#fbbf24;text-align:center">'+medal+'</div>'
          +'<div style="width:90px;font-size:12px;color:#f1f5f9;font-weight:600">'+es(r.nome)+'</div>'
          +'<div style="flex:1;background:#27272a;border-radius:5px;height:8px;overflow:hidden"><div style="width:'+barW+'%;height:100%;background:#f43f5e"></div></div>'
          +'<div style="width:90px;text-align:right;font-size:12px;color:#34d399;font-weight:600">'+fmt(r.total)+'</div></div>';
      }).join("");
      rankingHtml='<div class="cd"><div class="ct">\uD83C\uDFC6 Ranking de Profissionais \u2014 '+MESES[S.month]+'</div>'+rkRows+'</div>';
    }
  }

  /* MY SERVICE HISTORY ŌĆö only when profissional viewing own page */
  var historyHtml="";
  if(myName){
    var myServices=fs.filter(function(r){
      var ns=(r.profissionais||[r.profissional]).filter(function(n){return n;});
      return ns.indexOf(myName)>=0;
    }).slice().sort(function(a,b){return b.date.localeCompare(a.date);});
    var histRows=myServices.map(function(r){
      var c=cm(effVal(r),r.formaPagamento,r.taxaComissao);
      var ns=(r.profissionais||[r.profissional]).filter(function(n){return n;});
      var teamTag=ns.length>1?'<span style="color:#71717a;font-size:9px"> (equipe de '+ns.length+')</span>':"";
      return'<tr><td>'+fdt(r.date)+'</td><td style="color:#f1f5f9">'+es(r.trabalho)+teamTag+'</td><td>'+es(r.cliente||"")+'</td><td class="hi">'+fmt(c)+'</td></tr>';
    }).join("");
    historyHtml='<div class="cd"><div class="ct">Meus Atendimentos \u2014 '+MESES[S.month]+' '+S.year+' ('+myServices.length+')</div>'
      +'<div class="ox">'+(myServices.length?'<table><thead><tr><th>Data</th><th>Servi\u00e7o</th><th>Cliente</th><th>Comiss\u00e3o</th></tr></thead><tbody>'+histRows+'</tbody></table>':'<div class="emp">Nenhum atendimento neste per\u00edodo</div>')+'</div></div>';
  }

  return(myName?'<div class="pg"><div class="ph"><h2>Meus Ganhos \u2014 '+MESES[S.month]+' '+S.year+'</h2></div>':'<div class="pg"><div class="ph"><h2>Pr\u00f3-Labore \u2014 '+MESES[S.month]+' '+S.year+'</h2><div style="display:flex;gap:8px"><button class="gb" onclick="openRankingSettings()">\uD83C\uDFC6 Configurar Ranking</button><button class="gb" onclick="openPLSettings()">\u2699\uFE0F Configurar Sal\u00e1rios</button></div></div>')
    +'<div class="kg">'+kp("Base Total",fmt(tB))+kp("Com. Servi\u00e7os",fmt(tCS))+kp("Com. Produtos",fmt(tCP))+kp("Total a Pagar",fmt(tR),"- Adiant: "+fmt(tA))+'</div>'
    +rankingHtml
    +'<div class="cd"><div class="ox"><table><thead><tr><th>Profissional</th><th>Base</th><th>Com.Serv.</th><th>Com.Prod.</th><th>Total Bruto</th><th>Adiantamento</th><th>A Receber</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
    +'<div style="border-top:1px solid #3f3f46;padding-top:9px;margin-top:6px;text-align:right;font-size:12px;color:#a1a1aa">Total a Pagar: <strong style="color:#f43f5e">'+fmt(tR)+'</strong></div></div>'
    +historyHtml+'</div>';
}

function rDRE(fs,fp,fe,fa){
  var fpSal=fp.filter(function(r){return!r.externa;});
  var rB=fs.reduce(function(s,r){return s+effVal(r);},0);
  var vPBruto=fpSal.reduce(function(s,r){return s+fl(r.valorUnitario*r.quantidade,r.formaPagamento||"PIX");},0);
  var recBruta=rB+vPBruto;
  var dM=fs.reduce(function(s,r){return s+(r.valor-fl(r.valor,r.formaPagamento));},0);
  var impServ=rB*0.06;
  var impProd=vPBruto*0.04;
  var recLiq=recBruta-dM-impServ-impProd;
  var cmvS=fs.reduce(function(s,r){return s+(r.custoMaterial||0);},0);
  var cmvP=fpSal.reduce(function(s,r){return s+(r.custo||0)*r.quantidade;},0);
  var cmvTotal=cmvS+cmvP;
  var margemBruta=recLiq-cmvTotal;
  var cE=fs.reduce(function(s,r){var _n=(r.profissionais||[r.profissional]).filter(function(x){return x;});return s+cm(effVal(r),r.formaPagamento,r.taxaComissao)*Math.max(1,_n.length);},0);
  var byCateg={};fe.forEach(function(r){var c=r.categoria||"Outros";byCateg[c]=(byCateg[c]||0)+r.valorPago;});
  var despFixas=byCateg["Fixo"]||0;
  var despMkt=byCateg["Marketing"]||0;
  var despOp=fe.reduce(function(s,r){return s+r.valorPago;},0)-despFixas-despMkt;
  var ebitda=margemBruta-cE-despOp-despFixas-despMkt;
  var plT=Object.values(getPL()).reduce(function(s,v){return s+v;},0);
  var avTotal=fa.reduce(function(s,r){return s+r.valor;},0);
  var lucroLiq=ebitda-plT-avTotal;
  function dr(l,v,ind,neg){
    return'<tr><td style="padding:6px 13px;color:'+(ind?"#a1a1aa":"#e4e4e7")+';padding-left:'+(ind?30:13)+'px">'+l+'</td>'
      +'<td style="padding:6px 13px;text-align:right;color:'+(neg?"#f87171":"#d4d4d8")+'">'+(neg&&v>0?"- ":"")+fmt(Math.abs(v))+'</td></tr>';
  }
  function sec(l){return'<tr style="background:#111115"><td colspan="2" style="padding:8px 13px 3px;font-size:9px;color:#52525b;font-weight:700;text-transform:uppercase;letter-spacing:.07em">'+l+'</td></tr>';}
  function sum(l,v,c){return'<tr class="dsum"><td style="padding:9px 13px;color:#f1f5f9">'+l+'</td><td style="padding:9px 13px;text-align:right;color:'+c+'">'+fmt(v)+'</td></tr>';}
  var fbd={};
  fs.forEach(function(r){var d=r.date;if(!fbd[d])fbd[d]={e:0,s:0};fbd[d].e+=fl(r.valor,r.formaPagamento);});
  fpSal.forEach(function(r){var d=r.date;if(!fbd[d])fbd[d]={e:0,s:0};fbd[d].e+=fl(r.valorUnitario*r.quantidade,r.formaPagamento||"PIX");});
  fe.forEach(function(r){var d=r.date;if(!fbd[d])fbd[d]={e:0,s:0};fbd[d].s+=r.valorPago;});
  fa.forEach(function(r){var d=r.date;if(!fbd[d])fbd[d]={e:0,s:0};fbd[d].s+=r.valor;});
  var days=Object.keys(fbd).sort();
  var mx2=1;days.forEach(function(d){mx2=Math.max(mx2,fbd[d].e,fbd[d].s);});
  var W=340,H=120,bph=H-26;
  var dfcBars=days.map(function(d,i){
    var bw=Math.max(3,Math.floor((W-16)/Math.max(days.length,1)/2)-2);
    var x=16+i*Math.floor((W-16)/Math.max(days.length,1));
    var he=Math.max(1,Math.round((fbd[d].e/mx2)*bph));
    var hs=Math.max(1,Math.round((fbd[d].s/mx2)*bph));
    return'<rect x="'+x+'" y="'+(H-20-he)+'" width="'+bw+'" height="'+he+'" fill="#34d399" rx="1"/>'
      +'<rect x="'+(x+bw+1)+'" y="'+(H-20-hs)+'" width="'+bw+'" height="'+hs+'" fill="#f43f5e" rx="1"/>'
      +'<text x="'+(x+bw)+'" y="'+(H-4)+'" font-size="7" fill="#71717a" text-anchor="middle">'+(d.slice(8))+'</text>';
  }).join("");
  var dfcSvg=days.length?'<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'">'+dfcBars+'</svg>'
    +'<div style="font-size:10px;color:#71717a;margin-top:3px"><span style="color:#34d399">\u2588</span> Entradas &nbsp;<span style="color:#f43f5e">\u2588</span> Sa\u00eddas</div>'
    :'<p style="color:#52525b;padding:10px 0">Sem dados</p>';
  return'<div class="pg"><div class="ph"><h2>DRE / DFC \u2014 '+MESES[S.month]+' '+S.year+'</h2></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'
    +'<div class="cd"><div class="ct">Demonstrativo de Resultado (DRE)</div>'
    +'<table class="dt"><tbody>'
    +sec("(+) RECEITA BRUTA")+dr("Fat. Bruto Servi\u00e7os",rB,true)+dr("Venda Bruta Produtos",vPBruto,true)+sum("= RECEITA BRUTA TOTAL",recBruta,"#38bdf8")
    +sec("(-) DEDU\u00c7\u00d5ES")+dr("Taxa Maquininha",dM,true,true)+dr("Imposto Servi\u00e7os (6%)",impServ,true,true)+dr("Imposto Produtos (4%)",impProd,true,true)+sum("= RECEITA L\u00cdQUIDA",recLiq,"#34d399")
    +sec("(-) CMV")+dr("Custo Material Servi\u00e7os",cmvS,true,true)+dr("Custo Produtos Vendidos",cmvP,true,true)+sum("= MARGEM BRUTA",margemBruta,margemBruta>=0?"#34d399":"#f87171")
    +sec("(-) DESPESAS")+dr("Comiss\u00f5es da Equipe",cE,true,true)+dr("Despesas Operacionais",despOp,true,true)+dr("Despesas Fixas",despFixas,true,true)+dr("Marketing / Tr\u00e1fego",despMkt,true,true)
    +sum("= EBITDA",ebitda,ebitda>=0?"#34d399":"#f87171")
    +sec("(-) ENCARGOS")+dr("Pr\u00f3-Labore (prev.)",plT,true,true)+dr("Adiantamentos",avTotal,true,true)
    +'<tr class="dfin"><td style="padding:10px 13px;color:#f1f5f9">= RESULTADO L\u00cdQUIDO</td><td style="padding:10px 13px;text-align:right;font-size:15px;color:'+(lucroLiq>=0?"#34d399":"#f87171")+'">'+fmt(lucroLiq)+'</td></tr>'
    +'</tbody></table></div>'
    +'<div>'
    +'<div class="cd"><div class="ct">Fluxo de Caixa (DFC)</div>'+dfcSvg
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:10px">'
    +'<div style="background:#27272a;border-radius:7px;padding:8px;text-align:center"><div style="font-size:10px;color:#71717a">Entradas</div><div style="color:#34d399;font-weight:700;font-size:12px">'+fmt(recLiq)+'</div></div>'
    +'<div style="background:#27272a;border-radius:7px;padding:8px;text-align:center"><div style="font-size:10px;color:#71717a">Sa\u00eddas</div><div style="color:#f43f5e;font-weight:700;font-size:12px">'+fmt(fe.reduce(function(s,r){return s+r.valorPago;},0)+avTotal)+'</div></div>'
    +'<div style="background:#27272a;border-radius:7px;padding:8px;text-align:center"><div style="font-size:10px;color:#71717a">Saldo</div><div style="color:#38bdf8;font-weight:700;font-size:12px">'+fmt(recLiq-fe.reduce(function(s,r){return s+r.valorPago;},0)-avTotal)+'</div></div>'
    +'</div></div>'
    +'<div class="cd" style="margin-top:14px"><div class="ct">Despesas por Categoria</div>'
    +bhC(Object.keys(byCateg).map(function(k){return{n:k,v:Math.round(byCateg[k])};}).sort(function(a,b){return b.v-a.v;}),"#818cf8",false)
    +'</div></div></div></div>';
}

/* ŌöĆ CLIENTS TAB ŌöĆ */
/* FIX: search only updates #cli-results, input never re-rendered */
function buildCliTable(q,sort){
  var cmap=buildCliMap();
  var all=Object.values(cmap).map(function(c){
    var sorted=c.datas.slice().sort(),last=sorted.length?sorted[sorted.length-1]:c.dataCadastro||hj();
    return{nome:c.nome,tel:c.tel,email:c.email,cap:c.cap,last:last,dias:ds(last),gasto:c.gasto,qtd:c.qtd,svcs:c.svcs.filter(function(v,i,a){return a.indexOf(v)===i;}),obs:c.obs,contatoOnly:c.contatoOnly,fonte:c.fonte};
  });
  var ql=(q||"").toLowerCase();var svcFil=S.cliSvcFilter||"";
  var fil=all.filter(function(c){
    if(ql&&c.nome.toLowerCase().indexOf(ql)<0&&c.tel.indexOf(ql)<0&&c.email.toLowerCase().indexOf(ql)<0)return false;
    if(svcFil&&c.svcs.indexOf(svcFil)<0)return false;
    return true;
  });
  fil.sort(function(a,b){return sort==="dias"?b.dias-a.dias:sort==="qtd"?b.qtd-a.qtd:sort==="gasto"?b.gasto-a.gasto:a.nome.localeCompare(b.nome);});
  if(!fil.length)return'<div class="emp">Nenhuma cliente encontrada</div>';
  var rows=fil.slice(0,200).map(function(c){

function openClientProfile(nome){
  var key=nome.trim().toUpperCase();
  var cmap=buildCliMap();
  var c=cmap[key];
  if(!c){
    // pode ser s├│ contato importado sem atendimento
    var cx0=D.contacts.find(function(x){return x.nome.trim().toUpperCase()===key;});
    if(!cx0)return;
    c={nome:cx0.nome,gasto:0,qtd:0,key:key,tel:cx0.telefone||"",email:cx0.email||""};
  }
  var ranking=clientRanking();
  var pos=ranking.findIndex(function(r){return r.key===key;})+1;
  var medal=pos===1?"\uD83E\uDD47":pos===2?"\uD83E\uDD48":pos===3?"\uD83E\uDD49":"";
  var contato=D.contacts.find(function(x){return x.nome.trim().toUpperCase()===key;})||{};
  var canEdit=CURRENT_USER&&(CURRENT_USER.role==="admin"||CURRENT_USER.role==="recepcao");

  // hist├│rico de atendimentos ordenado por data desc
  var hist=D.svc.filter(function(r){return r.cliente&&r.cliente.trim().toUpperCase()===key;})
    .sort(function(a,b){return b.date.localeCompare(a.date);});
  var ultObs=hist[0]&&hist[0].obs?hist[0].obs:"";

  var rows=hist.map(function(r){
    var profs=(r.profissionais||[r.profissional]).filter(Boolean).join(", ");
    return'<tr><td>'+fdt(r.date)+'</td><td>'+es(r.trabalho||"")+'</td>'
      +'<td style="color:#71717a">'+es(profs)+'</td>'
      +'<td style="color:#34d399">'+fmt(effVal(r))+'</td>'
      +'<td style="color:#a1a1aa;font-size:10px;max-width:180px;white-space:normal">'+es(r.obs||"")+'</td></tr>';
  }).join("")||'<tr><td colspan="5" style="text-align:center;color:#52525b;padding:14px">Nenhum atendimento registrado ainda</td></tr>';

  var medalStr=medal?(" "+medal+" "):"";
  var rankBadge=(pos&&pos<=10)?'<div style="background:#fbbf2414;border:1px solid #fbbf2440;color:#fbbf24;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;display:inline-block;margin-bottom:10px">'+medalStr+'#'+pos+' que mais gasta no Studio A R</div>':'';

  var editFields=canEdit
    ?'<div class="g2"><div class="fi"><label>Nome completo</label><input type="text" id="cp-nome" value="'+es(c.nome)+'"></div>'
      +'<div class="fi"><label>Telefone</label><input type="text" id="cp-tel" value="'+es(contato.telefone||c.tel||"")+'"></div></div>'
      +'<div class="g2"><div class="fi"><label>E-mail</label><input type="email" id="cp-email" value="'+es(contato.email||c.email||"")+'"></div>'
      +'<div class="fi"><label>Data de nascimento</label><input type="date" id="cp-nasc" value="'+(contato.nascimento||"")+'"></div></div>'
      +'<div class="fi"><label>Endere\u00e7o completo</label><input type="text" id="cp-end" value="'+es(contato.endereco||"")+'"></div>'
      +'<div class="fi"><label>Capta\u00e7\u00e3o</label><select id="cp-cap">'+ol(CAPS,contato.captacao||c.cap||"CLIENTE")+'</select></div>'
      +'<div class="g2"><div class="fi"><label>Pr\u00f3ximo retorno</label><input type="date" id="cp-prox" value="'+(contato.proximoRetorno||"")+'"></div>'
      +'<div class="fi"><label>Observa\u00e7\u00e3o</label><input type="text" id="cp-obsret" value="'+es(contato.obsRetorno||"")+'"></div></div>'
      +'<input type="hidden" id="cp-oldnome" value="'+es(c.nome)+'">'
      +'<button class="pb" onclick="saveClientProfile()">\uD83D\uDCBE Salvar altera\u00e7\u00f5es</button>'
    :'<div class="com-info">'+es(contato.telefone||c.tel||"sem telefone")+' &middot; '+es(contato.email||"sem e-mail")+' &middot; '+es(contato.endereco||"sem endere\u00e7o")+(contato.nascimento?' &middot; nasc. '+fdt(contato.nascimento):'')+'</div>';

  omod(mhdr("\uD83D\uDC64 "+es(c.nome))

    +(ultObs?'<div style="background:#27272a;border-left:3px solid #f43f5e;padding:8px 11px;border-radius:0 6px 6px 0;font-size:11px;color:#d4d4d8;margin-bottom:12px"><div style="color:#71717a;font-size:10px;margin-bottom:3px">Obs. \u00faltimo atendimento</div>'+es(ultObs)+'</div>':"")

function saveClientProfile(){
  var nomeNovo=document.getElementById("cp-nome").value.trim();
  var nomeAntigo=document.getElementById("cp-oldnome").value.trim();
  if(!nomeNovo)return alert("Nome n├Żo pode ficar vazio.");
  var oldCx=D.contacts.find(function(c){return c.nome.trim().toUpperCase()===nomeAntigo.toUpperCase();})||{};
  var newCx={
    id:slug(nomeNovo),nome:nomeNovo,
    telefone:document.getElementById("cp-tel").value.trim(),
    email:document.getElementById("cp-email").value.trim(),
    nascimento:document.getElementById("cp-nasc").value,
    endereco:document.getElementById("cp-end").value.trim(),
    captacao:document.getElementById("cp-cap").value,
    proximoRetorno:document.getElementById("cp-prox").value||null,
    obsRetorno:document.getElementById("cp-obsret").value.trim()
  };
  var fields=["nome","telefone","email","nascimento","endereco","captacao"];
  var diff={};
  fields.forEach(function(f){if((oldCx[f]||"")!==(newCx[f]||""))diff[f]={antes:oldCx[f]||"",depois:newCx[f]||""};});
  db.collection("contatos").doc(slug(nomeNovo)).set(newCx,{merge:true});
  if(Object.keys(diff).length>0){
    db.collection("auditoria").add({id:uid(),tipo:"edicao_perfil_cliente",colecao:"contatos",
      docId:slug(nomeNovo),nomeCliente:nomeNovo,alteracoes:diff,
      alteradoPor:CURRENT_USER?CURRENT_USER.nome:"?",alteradoPorRole:CURRENT_USER?CURRENT_USER.role:"?",
      timestamp:new Date().toISOString()});
  }
  showToast("\u2705 Cadastro de "+nomeNovo+" salvo!");cmod();
}

function rRequests(){
  var reqs=(D.requests||[]).slice().sort(function(a,b){
    var order={pendente:0,confirmado:1,cancelado:2};
    return (order[a.status]||0)-(order[b.status]||0) || (b.createdAt||"").localeCompare(a.createdAt||"");
  });
  var pend=reqs.filter(function(r){return r.status==="pendente";}).length;
  var cards=reqs.length?reqs.map(function(r){
    var cls=r.status==="confirmado"?"req-conf":r.status==="cancelado"?"req-canc":"req-pend";
    var lbl=r.status==="confirmado"?"Confirmado":r.status==="cancelado"?"Cancelado":"Pendente";
    var actions=r.status==="pendente"
      ?'<div class="req-actions"><button class="ok" data-req-confirm="'+r.id+'">Confirmar</button><button class="no" data-req-cancel="'+r.id+'">Recusar</button></div>'
      :"";
    return'<div class="req-card"><div class="req-info"><div class="nm">'+es(r.nome)+' &middot; '+es(r.telefone)+'</div>'
      +'<div class="meta">'+es(r.servico)+' &middot; '+fdt(r.date)+' \u00e0s '+es(r.time)+(r.professional?' \u00b7 '+es(r.professional):'')+'</div></div>'
      +'<span class="req-badge '+cls+'">'+lbl+'</span>'+actions+'</div>';
  }).join(""):'<div class="emp">Nenhuma solicita\u00e7\u00e3o de agendamento ainda</div>';
  return'<div class="pg"><div class="ph"><h2>Solicita\u00e7\u00f5es Online</h2>'
    +(pend?'<span class="req-badge req-pend">'+pend+' pendente'+(pend>1?"s":"")+'</span>':'')+'</div>'
    +'<div style="font-size:11px;color:#71717a;margin-bottom:14px">Pedidos enviados pelas clientes na p\u00e1gina p\u00fablica de agendamento. Confirme para criar o agendamento na agenda, ou recuse se n\u00e3o houver disponibilidade.</div>'
    +cards+'</div>';
}
function confirmRequest(id){
  var r=(D.requests||[]).find(function(x){return x.id===id;});
  if(!r)return;
  var agnRec={id:uid(),date:r.date,time:r.time,duration:60,professional:r.professional||getProfs()[0],
    client:r.nome,phone:r.telefone,service:r.servico,status:"confirmado",valor:0,obs:"Origem: agendamento online",createdBy:CURRENT_USER?CURRENT_USER.role:""};
  db.collection("agendamentos").doc(agnRec.id).set(agnRec);
  var slotId=agnRec.date+"_"+agnRec.time.replace(":","")+"_"+slug(agnRec.professional);
  db.collection("horariosPublicos").doc(slotId).set({date:agnRec.date,time:agnRec.time,professional:agnRec.professional,status:"ocupado",agendamentoId:agnRec.id});
  db.collection("solicitacoes").doc(id).update({status:"confirmado"});
  updateContactAfterSave({cliente:r.nome,telefone:r.telefone});
}
function cancelRequest(id){
  if(!confirm("Recusar esta solicita\u00e7\u00e3o?"))return;
  db.collection("solicitacoes").doc(id).update({status:"cancelado"});
}

function rLeadsBoard(){

      var due=l.proximoContato&&l.proximoContato<=hj()&&st!=="convertido"&&st!=="perdido";
      return'<div class="lead-card" draggable="true" data-lead-id="'+l.id+'" style="border-left-color:'+LEAD_STAGE_COLOR[st]+'" data-lead-open="'+l.id+'">'
        +'<div class="nm">'+es(l.nome)+'</div>'

        +'<div class="mt"><span>'+es(l.responsavel||"")+'</span>'+(l.proximoContato?'<span class="'+(due?"lead-due":"")+'">'+(due?"\u26a0 ":"\uD83D\uDCC5 ")+fdt(l.proximoContato)+'</span>':'')+'</div></div>';
    }).join("");

function rLeadsToday(){
  var dia=S.leadsDay||hj();
  var ehHoje=dia===hj();
  var leads=(D.leads||[]).filter(function(l){
    return l.proximoContato&&l.proximoContato<=dia&&l.etapa!=="convertido"&&l.etapa!=="perdido";
  }).sort(function(a,b){return(a.proximoContato||"").localeCompare(b.proximoContato||"");});
  if(!leads.length)return'<div class="emp">Nenhum lead para chamar '+(ehHoje?"hoje":"em "+fdt(dia))+'.</div>';
  var rows=leads.map(function(l){
    var atraso=l.proximoContato<dia;
    var ultHora="";
    var hist=l.historico||[];
    if(hist.length){var u=hist[hist.length-1];ultHora=u.hora?" \u00e0s "+u.hora:"";}
    return'<div class="lead-today-row"><div>'
      +'<div style="font-size:13px;font-weight:600;color:#f1f5f9">'+es(l.nome)+' &middot; '+es(l.telefone||"sem telefone")+'</div>'
      +'<div style="font-size:11px;color:#a1a1aa;margin-top:2px">'+es(l.interesse||"")+' &middot; <span style="color:'+LEAD_STAGE_COLOR[l.etapa]+'">'+LEAD_STAGE_LABELS[l.etapa]+'</span>'
      +(atraso?' &middot; <span style="color:#f87171;font-weight:600">pendente desde '+fdt(l.proximoContato)+'</span>':'')
      +(ultHora?'<span style="color:#71717a;font-size:10px"> &middot; \u00faltimo contato'+ultHora+'</span>':'')
      +(l.responsavel?' &middot; <span style="color:#71717a">'+es(l.responsavel)+'</span>':'')
      +'</div></div>'
      +'<div class="lead-today-actions">'
      +'<button style="background:#38bdf8;color:#000" data-lead-open="'+l.id+'">Registrar contato</button>'
      +'<button style="background:#fbbf24;color:#000" data-lead-agendar="'+l.id+'">Agendar</button>'
      +'<button style="background:#27272a;color:#f87171;border:1px solid #3f3f46" data-lead-perdido="'+l.id+'">Perdido</button>'
      +'</div></div>';
  }).join("");

function rLeadsPanel(){
  var leads=(D.leads||[]).filter(function(l){var g=gmy(l.dataCriacao);return g.m===S.month&&g.y===S.year;});
  var total=leads.length;
  var comContato=leads.filter(function(l){return(l.historico||[]).length>0;}).length;
  var agendados=leads.filter(function(l){return l.etapa==="agendado"||l.etapa==="convertido";}).length;
  var convertidos=leads.filter(function(l){return l.etapa==="convertido";}).length;
  var perdidos=leads.filter(function(l){return l.etapa==="perdido";});
  var motivos={};
  perdidos.forEach(function(l){var m=l.motivoPerda||"N\u00e3o informado";motivos[m]=(motivos[m]||0)+1;});
  var motivoItems=Object.keys(motivos).map(function(k){return{label:k,value:motivos[k]};});
  var pct=function(n){return total?Math.round(n/total*100):0;};
  return'<div class="kg">'
    +kp("Leads no per\u00edodo",total)
    +kp("Taxa de contato",pct(comContato)+"%",comContato+" contatados")
    +kp("Taxa de agendamento",pct(agendados)+"%",agendados+" agendados")
    +kp("Taxa de convers\u00e3o",pct(convertidos)+"%",convertidos+" viraram cliente")
    +'</div>'
    +(motivoItems.length?'<div class="cd"><div class="ct">Motivos de perda</div>'+bhC(motivoItems,"#f87171")+'</div>':'');
}

function saveStockEntry(){
  var nome=document.getElementById("se-nome").value.trim().toUpperCase();
  var qtd=parseFloat(document.getElementById("se-qtd").value);
  var un=document.getElementById("se-un").value;
  var valor=parseFloat(document.getElementById("se-valor").value)||0;
  if(!nome||!qtd)return alert("Preencha produto e quantidade.");
  var docId=slug(nome);
  var ref=db.collection("estoque").doc(docId);
  db.runTransaction(function(tx){
    return tx.get(ref).then(function(doc){
      var data=doc.exists?doc.data():{};
      var novaQtd=(data.quantidadeAtual||0)+qtd;
      var novaCap=Math.max(data.capacidadeReferencia||0,novaQtd);
      tx.set(ref,{nome:nome,unidade:un,quantidadeAtual:novaQtd,capacidadeReferencia:novaCap,valorTotalInvestido:(data.valorTotalInvestido||0)+valor});
    });
  }).then(function(){
    db.collection("estoqueEntradas").add({id:uid(),produtoId:docId,produtoNome:nome,date:document.getElementById("se-d").value,quantidade:qtd,unidade:un,valorPago:valor,registradoPor:CURRENT_USER?CURRENT_USER.nome:"",timestamp:new Date().toISOString()});
    showToast("\u2705 Entrada registrada no estoque!");
    cmod();
  }).catch(function(err){showToast("\u274c Erro: "+err.message,"#f43f5e");});
}

function rT(){
  var fs=fmy(D.svc,S.month,S.year);
  var fp=fmy(D.prd,S.month,S.year);
  var fe=fmy(D.exp,S.month,S.year);
  var fa=fmy(D.adv,S.month,S.year);
  var h="";
  if(S.tab==="dashboard")h=rDash(fs,fp,fe,fa);
  else if(S.tab==="agenda")h=rAgenda();
  else if(S.tab==="services")h=rSvc(fs);
  else if(S.tab==="products")h=rPrd(fp);
  else if(S.tab==="expenses")h=rExp(fe);

document.addEventListener("dragstart",function(e){
  var card=e.target.closest("[data-lead-id]");
  if(!card)return;
  e.dataTransfer.setData("text/plain",card.dataset.leadId);
  e.dataTransfer.effectAllowed="move";
  card.classList.add("dragging");
});
document.addEventListener("dragend",function(e){
  var card=e.target.closest("[data-lead-id]");
  if(card)card.classList.remove("dragging");
  document.querySelectorAll(".lead-col-bd.drag-over").forEach(function(z){z.classList.remove("drag-over");});
});
document.addEventListener("dragover",function(e){
  var zone=e.target.closest("[data-lead-dropzone]");
  if(!zone)return;
  e.preventDefault();
  e.dataTransfer.dropEffect="move";
  zone.classList.add("drag-over");
});
document.addEventListener("dragleave",function(e){
  var zone=e.target.closest("[data-lead-dropzone]");
  if(zone&&!zone.contains(e.relatedTarget))zone.classList.remove("drag-over");
});
document.addEventListener("drop",function(e){
  var zone=e.target.closest("[data-lead-dropzone]");
  if(!zone)return;
  e.preventDefault();
  zone.classList.remove("drag-over");
  var id=e.dataTransfer.getData("text/plain");if(!id)return;
  var novaEtapa=zone.dataset.leadDropzone;
  var lead=(D.leads||[]).find(function(l){return l.id===id;});
  if(!lead||lead.etapa===novaEtapa)return;
  if(novaEtapa==="agendado"){leadToAgenda(id);return;}
  if(novaEtapa==="perdido"){openLeadLost(id);return;}
  if(novaEtapa==="convertido"){leadConvert(id);return;}
  db.collection("leads").doc(id).update({etapa:novaEtapa}).then(function(){
    showToast("\u2705 "+lead.nome+" movida para "+LEAD_STAGE_LABELS[novaEtapa]);
  }).catch(function(err){showToast("\u274c Erro: "+err.message,"#f43f5e");});
});

  document.body.appendChild(ov);
  var emojis=["\uD83D\uDCB0","\uD83E\uDD11","\u2B50","\uD83C\uDF89","\uD83D\uDCAB","\uD83D\uDCB5","\uD83C\uDF7E"];

    [523,659,784,1047].forEach(function(freq,i){

      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;o.type="sine";
      g.gain.setValueAtTime(0.15,ctx.currentTime+i*0.12);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.4);

}

function gerarLinkMP(){
  var token=(document.getElementById("mp-pay-token").value||"").trim();
  var desc=(document.getElementById("mp-pay-desc").value||"Studio A R").trim();
  var val=parseFloat(document.getElementById("mp-pay-val").value)||0;
  if(!token)return showToast("\u274c Token MP n\u00e3o configurado. Avise o administrador.","#f43f5e");
  if(!val)return showToast("\u274c Informe o valor","#f43f5e");
  var res=document.getElementById("mp-pay-result");
  if(res)res.innerHTML='<div style="color:#71717a;font-size:11px">\u23F3 Gerando link...</div>';
  fetch("https://api.mercadopago.com/checkout/preferences",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
    body:JSON.stringify({items:[{title:desc,quantity:1,unit_price:val,currency_id:"BRL"}],
      back_urls:{success:"https://antonrunge.github.io/studio-ar",failure:"https://antonrunge.github.io/studio-ar"},
      auto_return:"approved",statement_descriptor:"STUDIO A R"})
  }).then(function(r){return r.json();}).then(function(data){
    if(data.init_point){
      var link=data.init_point;
      if(res)res.innerHTML='<div style="background:#34d39914;border:1px solid #34d39930;padding:10px;border-radius:8px">'
        +'<div style="color:#34d399;font-weight:600;margin-bottom:6px">&#10003; Link gerado com sucesso!</div>'
        +'<div style="font-size:11px;margin-bottom:8px;word-break:break-all"><a href="'+link+'" target="_blank" style="color:#38bdf8">'+link+'</a></div>'
        +'<div style="display:flex;gap:8px">'
        +'<button class="pb" id="mp-copy-btn">&#128203; Copiar Link</button>'
        +'<button class="gb" onclick="window.open(\''+link+'\',\'_blank\')">&#128279; Abrir</button>'
        +'</div></div>';
      document.getElementById("mp-copy-btn").onclick=function(){
        navigator.clipboard.writeText(link).then(function(){showToast("\u2705 Link copiado! Cole no WhatsApp da cliente.");});
      };
    } else {
      if(res)res.innerHTML='<div style="color:#f87171;font-size:11px">Erro: '+(data.message||data.error||JSON.stringify(data))+'</div>';
    }
  }).catch(function(err){
    if(res)res.innerHTML='<div style="color:#f87171;font-size:11px">Erro de conex\u00e3o: '+err.message+'</div>';
  });
}

    +'<div class="fi"><label>Produto</label><select id="ae-prod"><option value="">Selecione...</option>'+prods.map(function(p){return'<option value="'+es(p.id)+'|'+es(p.nome)+'|'+es(p.unidade||"un")+'">'+es(p.nome)+'</option>';}).join("")+'</select></div>'
    +'</div>'

    +'<div class="fi"><label>Observa\u00e7\u00f5es</label><input type="text" id="ae-obs" placeholder="N\u00famero NF, lote, etc."></div>'
    +'<button class="pb" onclick="savArEntrada()">Salvar Entrada</button>');
  function upCt(){var q=parseFloat(document.getElementById("ae-qtd").value)||0;var cu=parseFloat(document.getElementById("ae-cu").value)||0;document.getElementById("ae-ct").value=(q*cu).toFixed(2);}
  document.getElementById("ae-qtd").oninput=upCt;
  document.getElementById("ae-cu").oninput=upCt;
}
function savArEntrada(){
  var prodRaw=document.getElementById("ae-prod").value;if(!prodRaw)return alert("Selecione o produto.");
  var parts=prodRaw.split("|");var prodId=parts[0],prodNome=parts[1],unidade=parts[2];
  var qtd=parseFloat(document.getElementById("ae-qtd").value)||0;
  if(qtd<=0)return alert("Quantidade inv\u00e1lida.");
  var cu=parseFloat(document.getElementById("ae-cu").value)||0;
  var rec={id:uid(),date:document.getElementById("ae-d").value,produto:prodNome,produtoId:prodId,
    unidade:unidade,quantidade:qtd,custoUnitario:cu,
    fornecedor:document.getElementById("ae-forn").value,obs:document.getElementById("ae-obs").value};
  db.collection("arEntradas").doc(rec.id).set(rec);
  // atualiza estoque do produto
  db.collection("arProdutos").doc(prodId).update({estoque:firebase.firestore.FieldValue.increment(qtd),custoPago:cu});
  showToast("\u2705 Entrada registrada! Estoque atualizado.");cmod();
}

function updateArPrecos(){

function savArSaida(){
  var prodRaw=document.getElementById("as-prod").value;if(!prodRaw)return alert("Selecione o produto.");
  var parts=prodRaw.split("|");var prodId=parts[0],prodNome=parts[1];
  var qtd=parseFloat(document.getElementById("as-qtd").value)||0;if(qtd<=0)return alert("Quantidade inv\u00e1lida.");
  var tipo=document.getElementById("as-tipo").value;
  var preco=parseFloat(document.getElementById("as-preco").value)||0;
  var rec={id:uid(),date:document.getElementById("as-d").value,produto:prodNome,produtoId:prodId,
    tipo:tipo,quantidade:qtd,precoUnitario:preco,
    destinatario:document.getElementById("as-dest").value,obs:document.getElementById("as-obs").value};
  db.collection("arSaidas").doc(rec.id).set(rec);
  // baixa estoque AR Prof
  db.collection("arProdutos").doc(prodId).update({estoque:firebase.firestore.FieldValue.increment(-qtd)});
  // se for para o sal├Żo, adiciona na prateleira
  if(tipo==="salao"){db.collection("arProdutos").doc(prodId).update({prateleira:firebase.firestore.FieldValue.increment(qtd)});}
  showToast("\u2705 Sa\u00edda registrada!");cmod();
}

/* PRATELEIRA DO SAL├āO */
function rArPrateleira(){
  var prods=D.arProdutos.filter(function(p){return(p.prateleira||0)>0;});
  var total=prods.reduce(function(s,p){return s+((p.prateleira||0)*(p.precoDistribuidor||0));},0);
  if(!prods.length)return'<div class="cd"><div class="emp">Nenhum produto na prateleira. Registre sa\u00eddas do tipo "Studio A R" para abastecer.</div></div>';
  var rows=prods.map(function(p){
    var cor=(p.prateleira||0)<=2?"#f87171":(p.prateleira||0)<=5?"#fbbf24":"#34d399";
    return'<tr>'
      +'<td><strong>'+es(p.nome)+'</strong><div style="font-size:10px;color:#71717a">'+es(p.categoria||"")+'</div></td>'
      +'<td style="color:'+cor+';font-weight:600">'+es(String(p.prateleira||0))+' '+es(p.unidade||"un")+'</td>'
      +'<td>'+fmt(p.precoDistribuidor||0)+'</td>'
      +'<td class="hi">'+fmt((p.prateleira||0)*(p.precoDistribuidor||0))+'</td>'
      +'<td><button class="gb" style="font-size:10px;padding:4px 8px" onclick="baixarPrateleira(\''+p.id+'\',\''+es(p.nome)+'\',\''+es(p.unidade||"un")+'\')">Baixar uso</button></td>'
      +'</tr>';
  }).join("");
  return'<div class="cd">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
    +'<div class="ct">&#128717; Prateleira do Studio A R</div>'
    +'<div style="font-size:11px;color:#a1a1aa">Valor em estoque: <strong style="color:#34d399">'+fmt(total)+'</strong></div></div>'
    +'<div class="ox"><table class="dt"><thead><tr><th>Produto</th><th>Qtd na Prateleira</th><th>Pre\u00e7o Distrib.</th><th>Valor Total</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}
function baixarPrateleira(prodId,nome,unidade){
  omod(mhdr("Baixar uso \u2014 "+es(nome))
    +'<div class="fi"><label>Quantidade usada/vendida ('+es(unidade)+')</label><input type="number" id="bp-qtd" value="1" min="0.1" step="0.1"></div>'
    +'<div class="fi"><label>Motivo</label><select id="bp-tipo"><option value="uso">Uso no sal\u00e3o (servi\u00e7o)</option><option value="venda">Venda para cliente</option><option value="perda">Perda / Descarte</option></select></div>'
    +'<button class="pb" onclick="savBaixarPrateleira(\''+prodId+'\')">\u2193 Registrar Baixa</button>');
}
function savBaixarPrateleira(prodId){
  var qtd=parseFloat(document.getElementById("bp-qtd").value)||0;
  if(qtd<=0)return;
  db.collection("arProdutos").doc(prodId).update({prateleira:firebase.firestore.FieldValue.increment(-qtd)});
  showToast("\u2705 Baixa registrada na prateleira!");cmod();
}

function enviarMsg(){
  var inp=document.getElementById("msg-input");
  if(!inp||!inp.value.trim())return;
  var texto=inp.value.trim();inp.value="";
  var roles={"admin":"Admin","recepcao":"Recep\u00e7\u00e3o","comercial":"Comercial","financeiro":"Financeiro","profissional":"Profissional","marketing":"Marketing"};
  db.collection("mensagens").add({
    de:CURRENT_USER?CURRENT_USER.nome:"?",
    roleLabel:CURRENT_USER?roles[CURRENT_USER.role]||"":"",
    texto:texto,
    ts:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    setTimeout(function(){var f=document.getElementById("msg-feed");if(f)f.scrollTop=f.scrollHeight;},200);
  });
}

/* ŌöĆ PIX ŌöĆ */
function crc16(str){
  var crc=0xFFFF;
  for(var i=0;i<str.length;i++){
    crc^=str.charCodeAt(i)<<8;
    for(var j=0;j<8;j++){crc=crc&0x8000?(crc<<1)^0x1021:(crc<<1);}
  }
  return(crc&0xFFFF).toString(16).toUpperCase().padStart(4,"0");
}
function buildPixPayload(valor){
  var chave="32022399000106";
  var nome="Studio A R";
  var cidade="Jacarei";
  function f(id,v){return id+String(v.length).padStart(2,"0")+v;}
  var pfi=f("00","01");
  var gui=f("00","br.gov.bcb.pix")+f("01",chave);
  var mai=f("26",gui);
  var mcc=f("52","0000");
  var moeda=f("53","986");
  var vlStr=valor&&valor>0?f("54",valor.toFixed(2)):"";
  var pais=f("58","BR");
  var nomeF=f("59",nome.slice(0,25));
  var cidadeF=f("60",cidade.slice(0,15));
  var txid=f("62",f("05","***"));
  var sem63=pfi+mai+mcc+moeda+vlStr+pais+nomeF+cidadeF+txid+"6304";
  return sem63+crc16(sem63);
}
function openPix(){
  var payload=buildPixPayload(0);
  var link="https://nubank.com.br/cobrar/"+encodeURIComponent(payload);
  omod(mhdr("\uD83D\uDCB8 Pagamento via PIX")
    +'<div style="text-align:center;padding:10px 0">'
    +'<div style="font-size:11px;color:#71717a;margin-bottom:8px">CNPJ: 32.022.399/0001-06 &mdash; Studio A R</div>'
    +'<div id="pix-qr" style="display:inline-block;background:#fff;padding:12px;border-radius:10px;margin-bottom:14px"></div>'
    +'</div>'
    +'<div class="fi"><label>Valor opcional (deixe 0 para a cliente digitar)</label>'
    +'<div style="display:flex;gap:8px"><input type="number" id="pix-val" placeholder="0.00" min="0" step="0.01" style="flex:1">'
    +'<button class="gb" onclick="updatePixQr()">Atualizar</button></div></div>'
    +'<div style="margin-top:10px"><label style="font-size:11px;color:#a1a1aa">PIX Copia e Cola</label>'
    +'<div style="display:flex;gap:6px;margin-top:4px">'
    +'<input type="text" id="pix-payload" value="'+payload+'" readonly style="font-size:10px;font-family:monospace;flex:1">'
    +'<button class="pb" onclick="copyPix()" style="flex-shrink:0;padding:8px 12px">\uD83D\uDCCB Copiar</button></div></div>'
    +'<div style="margin-top:10px;font-size:11px;color:#71717a">Para enviar pelo WhatsApp: copie o texto acima e cole no chat da cliente. Ela cola no app do banco e paga na hora.</div>');
  renderPixQr(payload);
}
function renderPixQr(payload){
  var el=document.getElementById("pix-qr");
  if(!el)return;
  el.innerHTML="";
  if(typeof QRCode!=="undefined"){
    new QRCode(el,{text:payload,width:180,height:180,colorDark:"#000000",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M});
  }else{
    var sc=document.createElement("script");
    sc.src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
    sc.onload=function(){new QRCode(el,{text:payload,width:180,height:180,colorDark:"#000000",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M});};
    document.head.appendChild(sc);
  }
}
function updatePixQr(){
  var val=parseFloat(document.getElementById("pix-val").value)||0;
  var payload=buildPixPayload(val);
  document.getElementById("pix-payload").value=payload;
  var el=document.getElementById("pix-qr");if(el)el.innerHTML="";
  renderPixQr(payload);
}
function copyPix(){
  var el=document.getElementById("pix-payload");
  if(!el)return;
  navigator.clipboard?navigator.clipboard.writeText(el.value).then(function(){showToast("\u2705 Pix Copia e Cola copiado!");})
    :(el.select(),document.execCommand("copy"),showToast("\u2705 Pix Copia e Cola copiado!"));
}
